<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms-learning</title>
</head>
<body>
    <h1>Form to apply for bs company</h1>
    <form action="post">
        <div>

            <label for="banna">your name</label>
            
            <input type="text" id="banna" name="name" placeholder="Enter your name" autofocus>
        </div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <div>
                <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike">
                <label for="vehicle1"> I have a bike</label><br>
            </div>
            <div>
                <label for="message">Your Message:</label>
                <br>
                <textarea name="message" id="message" cols="30" rows="10" placeholder=""></textarea>
            </div>
            <div>
                <label for="country">Country:</label>
                <br>
                <select name="country" id="country">
                    <option value="usa">United States</option>
                    <option value="canada">Canada</option>
                    <option value="uk">United Kingdom</option>
                </select>
            </div>
    
    </form>
</body>
</html>
